<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Back to Top — Tests</title>
  <style>
    body { font-family: monospace; margin: 2rem; }
    .pass { color: green; }
    .fail { color: red; }
    #results { white-space: pre-wrap; }

    /* Back to Top Button CSS */
    .gem-back-to-top{position:fixed;bottom:2rem;right:2rem;z-index:50;width:48px;height:48px;border:none;border-radius:50%;background:rgba(0,229,255,.15);color:var(--gem-cyan,#00e5ff);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 200ms ease-out,transform 200ms ease-out;transform:translateY(10px);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.gem-back-to-top[hidden]{display:flex}.gem-back-to-top--visible{opacity:1;pointer-events:auto;transform:translateY(0)}.gem-back-to-top--hiding{opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity 150ms ease-in,transform 150ms ease-in}.gem-back-to-top:hover{transform:translateY(0) scale(1.1);background:rgba(0,229,255,.25)}.gem-back-to-top__arrow{width:20px;height:20px;position:relative;z-index:1}.gem-back-to-top__progress{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}.gem-back-to-top__progress circle{stroke-dasharray:100.53;stroke-dashoffset:100.53;transition:stroke-dashoffset 50ms linear}
  </style>
</head>
<body>
  <h1>Back to Top Button — Tests</h1>

  <!-- Button under test -->
  <button class="gem-back-to-top" aria-label="Back to top" hidden>
    <svg class="gem-back-to-top__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
      <path d="M233.4 105.4c12.5-12.5 32.8-12.5 45.3 0l192 192c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L256 173.3 86.6 342.6c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l192-192z"/>
    </svg>
    <svg class="gem-back-to-top__progress" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="100.53" stroke-dashoffset="0"/>
    </svg>
  </button>

  <div id="results"></div>
  <script src="test-harness.js"></script>
  <script src="back-to-top.test.js"></script>
  <script>runTests()</script>
</body>
</html>
